name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'bin/**'
      - 'templates/**'
      - 'specializations/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Debug npm config
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          npm config list
          echo "---"
          cat ~/.npmrc 2>/dev/null || echo "no ~/.npmrc"
          cat .npmrc 2>/dev/null || echo "no .npmrc"
          echo "---"
          echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG"
          cat "$NPM_CONFIG_USERCONFIG" 2>/dev/null || echo "no userconfig"

      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view wayfind version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $LOCAL (remote is $REMOTE)"
          fi

      - run: npm install --omit=dev
        if: steps.check.outputs.skip == 'false'

      - run: npm publish --provenance --access public
        if: steps.check.outputs.skip == 'false'
