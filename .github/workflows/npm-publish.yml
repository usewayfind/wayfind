name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'bin/**'
      - 'templates/**'
      - 'specializations/**'
      - 'plugin/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'usewayfind/wayfind'
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11 --ignore-scripts

      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view wayfind version 2>/dev/null || echo "0.0.0")
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $LOCAL (remote is $REMOTE)"
          fi

      - run: npm install --omit=dev
        if: steps.check.outputs.skip == 'false'

      - run: npm publish --provenance --access public
        if: steps.check.outputs.skip == 'false'

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.check.outputs.version }}"
          # Use the commit message as the release body
          BODY=$(git log -1 --pretty=%B)
          gh release create "$VERSION" \
            --title "Wayfind $VERSION" \
            --notes "$BODY" \
            --latest
